<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Chocolate Sprinkles Cake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="card-container">
        <div id="setup-area">
            <div class="gift-icon">🎁</div>
            <h2 class="setup-title">You received a surprise gift!</h2>
            <p class="setup-subtitle">Click below to open and bake the birthday cake</p>
            <button class="bake-btn" onclick="startGlowCake()">Bake Chocolate Cake 🍫</button>
        </div>

        <div id="main-game" class="hidden">
            <h2 id="instruction" class="game-instruction">Type the magic word to extinguish the candles! 🎂✨</h2>

            <div class="cake-area" id="cake-drop-zone" ondragover="allowDrop(event)" ondrop="dropTopping(event)">
                <div class="cake-container-real">
                    <div class="candles-group">
                        <div class="candle c-pink" id="candle-1"><div class="flame"></div><div class="smoke"></div></div>
                        <div class="candle c-blue" id="candle-2"><div class="flame"></div><div class="smoke"></div></div>
                        <div class="candle c-yellow" id="candle-3"><div class="flame"></div><div class="smoke"></div></div>
                        <div class="candle c-green" id="candle-4"><div class="flame"></div><div class="smoke"></div></div>
                    </div>

                    <div class="cake-real-body">
                        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=600&auto=format&fit=crop" alt="Realistic Chocolate Cake" class="cake-img">
                        <div class="cake-shadow"></div>
                    </div>
                </div>

                <div class="decorations" id="decorations"></div>
            </div>

            <div class="topping-inventory" id="inventory">
                <p class="inventory-hint">Type "LOVE" to blow out the candles:</p>
                <div class="love-input-wrapper">
                    <input type="text" id="love-code-input" placeholder="Enter 'LOVE' here..." autocomplete="off" oninput="checkLoveCode(this)">
                </div>
            </div>
        </div>

        <div class="wishes hidden" id="wish-message">
            <div class="hearts-container" id="hearts-rain-zone"></div>
            
            <div class="photo-frame">
                <img src="Ma_3.jpg" alt="Birthday Person" class="celebrant-img" onerror="showDefaultAvatar(this)">
                <div class="default-avatar hidden">🎂</div>
            </div>
            
            <h1 class="neon-glow-title">HAPPY BIRTHDAY! 🎉</h1>
            
            <div class="clean-wish-panel">
                <div id="typewriter-text"></div>
            </div>
        </div>
    </div>

    <audio id="bg-music" src="ZNH.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
